name: Package Smoke

on:
  workflow_dispatch:

jobs:
  package-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package (mac smoke)
        run: npm run package:mac
